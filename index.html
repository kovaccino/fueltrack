<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FuelTrack Pro</title>
    <!-- Tailwind CSS per un design moderno ed elegante -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js per grafici statistici professionali -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Manifest per rendere l'app installabile sullo smartphone -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased pb-24">

    <!-- Header statico ed elegante -->
    <header class="bg-slate-800/50 backdrop-blur-md border-b border-slate-700/50 sticky top-0 z-50 px-4 py-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">FuelTrack Pro</h1>
            <span id="stats-badge" class="text-xs bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-full border border-emerald-500/20 font-medium">0 km/L Medi</span>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">
        
        <!-- Sezione Grafico Dashboard -->
        <section class="bg-slate-800 border border-slate-700/60 rounded-2xl p-4 shadow-xl">
            <h2 class="text-sm font-semibold text-slate-400 mb-3 uppercase tracking-wider">Andamento Prezzi (€/L)</h2>
            <div class="h-48 w-full">
                <canvas id="priceChart"></canvas>
            </div>
        </section>

        <!-- Form Inserimento Rapido -->
        <section class="bg-slate-800 border border-slate-700/60 rounded-2xl p-5 shadow-xl">
            <h2 class="text-sm font-semibold text-slate-400 mb-4 uppercase tracking-wider">Nuovo Rifornimento</h2>
            <form id="fuel-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Prezzo al Litro (€)</label>
                        <input type="number" id="price" step="0.001" placeholder="1.749" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-slate-100 focus:outline-none focus:border-emerald-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Spesa Totale (€)</label>
                        <input type="number" id="total" step="0.01" placeholder="50.00" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-slate-100 focus:outline-none focus:border-emerald-500 transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Chilometri Attuali Odometro</label>
                    <input type="number" id="km" placeholder="42000" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-slate-100 focus:outline-none focus:border-emerald-500 transition">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-slate-950 font-bold py-3 rounded-xl transition shadow-lg shadow-emerald-950/20 active:scale-[0.98]">
                    Registra Rifornimento
                </button>
            </form>
        </section>

        <!-- Storico Transazioni -->
        <section class="space-y-3">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Cronologia</h2>
                <button onclick="exportData()" class="text-xs text-cyan-400 hover:underline">Esporta CSV</button>
            </div>
            <div id="log-container" class="space-y-2.5">
                <!-- I log verranno inseriti qui dinamicamente da app.js -->
            </div>
        </section>
    </main>

    <!-- Barra di Navigazione Inferiore -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/80 backdrop-blur-lg border-t border-slate-800 py-3 px-6 z-50">
        <div class="max-w-md mx-auto flex justify-around text-slate-400">
            <button class="flex flex-col items-center space-y-1 text-emerald-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-[10px]">Nuovo</span>
            </button>
            <button onclick="clearAllData()" class="flex flex-col items-center space-y-1 hover:text-red-400 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 003 3h10M4 7h16"></path></svg>
                <span class="text-[10px]">Reset</span>
            </button>
        </div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
